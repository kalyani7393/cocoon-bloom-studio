<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0;url=/" />
    <script>
      // Redirect all 404s to index.html while preserving the path
      var path = location.pathname + location.search + location.hash;
      location.replace("/?redirect=" + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
